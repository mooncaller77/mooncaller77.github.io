<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>潮汐月历 | FM214831</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sniglet&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Long+Cang&display=swap');

    /* 彻底重置所有边距 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6) fixed;
      color: #9fbcd3;
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      
      /* 核心居中：flex 列布局，水平垂直都居中 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* 小号 FM 标识 */
    .signal-mark {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin: 40px auto 10px;
    }
    .fm-mini {
      font-size: 24px; font-weight: 400; letter-spacing: 2px;
      font-family: 'Sniglet', "PingFang SC", sans-serif;
      color: #a6e3ff;
      text-shadow: 0 0 10px rgba(135,206,235,0.5), 0 0 22px rgba(39,117,182,0.3);
    }
    .digital-mini { display: flex; gap: 5px; }
    .seg-char { position: relative; width: 18px; height: 32px; }
    .seg { position: absolute; background: rgba(120,200,255,0.08); }
    .seg.on { background: #87ceeb; box-shadow: 0 0 7px rgba(135,206,235,0.85); }
    .seg.a { top: 0; left: 4px; width: 10px; height: 2px; }
    .seg.b { top: 3px; right: 0; width: 2px; height: 11px; }
    .seg.c { bottom: 3px; right: 0; width: 2px; height: 11px; }
    .seg.d { bottom: 0; left: 4px; width: 10px; height: 2px; }
    .seg.e { bottom: 3px; left: 0; width: 2px; height: 11px; }
    .seg.f { top: 3px; left: 0; width: 2px; height: 11px; }
    .seg.g { top: 15px; left: 4px; width: 10px; height: 2px; }

    /* 页面标题 */
    .page-title {
      text-align: center;
      margin: 0 auto 8px;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: 1px;
      color: #d7f4ff;
      text-shadow: 0 0 14px rgba(135,206,235,0.38);
    }
    .page-subtitle {
      text-align: center;
      margin: 0 auto 30px;
      font-size: 16px;
      font-family: 'Long Cang', 'ZCOOL XiaoWei', cursive;
      color: rgba(206,234,246,0.7);
      letter-spacing: 1px;
    }

    /* 整个内容外壳：宽度固定，完全居中 */
    .calendar-wrapper {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Notion 日历容器 */
    .notion-container {
      width: 100%;
      height: 750px;
      max-height: calc(100vh - 200px);
      border: 1px solid rgba(135, 206, 235, 0.25);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(5,13,24,0.3);
      backdrop-filter: blur(4px);
    }
    .notion-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 返回链接 */
    .back-link {
      margin-top: 24px;
      margin-bottom: 40px;
      padding: 10px 18px;
      border-radius: 999px;
      color: rgba(198,232,246,0.85);
      font-size: 14px;
      text-decoration: none;
      background: rgba(5,13,24,0.3);
      transition: all 0.22s ease;
    }
    .back-link:hover { color: #ffffff; background: rgba(135,206,235,0.15); }

    /* 移动端适配 */
    @media (max-width: 640px) {
      .page-title { font-size: 24px; }
      .notion-container { height: 500px; }
    }
  </style>
</head>
<body>
  <div class="calendar-wrapper">
    <!-- 小号 FM 标识 -->
    <div class="signal-mark" aria-hidden="true">
      <div class="fm-mini">FM</div>
      <div class="digital-mini">
        <div class="seg-char"><div class="seg a on"></div><div class="seg b on"></div><div class="seg d on"></div><div class="seg e on"></div><div class="seg g on"></div></div>
        <div class="seg-char"><div class="seg b on"></div><div class="seg c on"></div></div>
        <div class="seg-char"><div class="seg b on"></div><div class="seg c on"></div><div class="seg f on"></div><div class="seg g on"></div></div>
        <div class="seg-char"><div class="seg a on"></div><div class="seg b on"></div><div class="seg c on"></div><div class="seg d on"></div><div class="seg e on"></div><div class="seg f on"></div><div class="seg g on"></div></div>
        <div class="seg-char"><div class="seg a on"></div><div class="seg b on"></div><div class="seg c on"></div><div class="seg d on"></div><div class="seg g on"></div></div>
        <div class="seg-char"><div class="seg b on"></div><div class="seg c on"></div></div>
      </div>
    </div>

    <h1 class="page-title">潮汐月历</h1>
    <p class="page-subtitle">记录每一次靠岸</p>

    <div class="notion-container">
      <iframe src="https://powerful-planarian-d06.notion.site/ebd/355adbbaac278094bc0cff8ec645ca47?v=355adbbaac2780b29b32000c837e1477" frameborder="0" allowfullscreen></iframe>
    </div>

    <a class="back-link" href="/map/">← 返回频道地图</a>
  </div>
</body>
</html>
