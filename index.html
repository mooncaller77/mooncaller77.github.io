<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FM214831</title>
<link rel="stylesheet" href="/css/main.css">

<style>

/* =========================
   🌊 原始配色系统（完全保留你）
   ========================= */

html, body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  font-family: "PingFang SC", "Noto Sans SC", sans-serif;
}

/* 夜（景泰蓝核心） */
body.night {
  background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6);
  color: #9fbcd3;
}

/* 黄昏（过渡天青蓝） */
body.dusk {
  background: linear-gradient(to bottom, #0b1220, #1b2a3a, #3a5f7a);
  color: #b8c9d8;
}

/* 阅读（深海夜蓝，不破坏体系） */
body.reading {
  background: #050d18;
  color: #dbe9f5;
}

/* =========================
   🌌 HERO
   ========================= */

.site-hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.site-hero.hide-hero {
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
}

.moon {
  position: absolute;
  width: 160px;
  height: 160px;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(135,206,235,0.3), transparent);
  filter: blur(10px);
  opacity: 0.85;
}

/* =========================
   📚 章节地图（原样保留）
   ========================= */

.chapter-map {
  padding: 80px 20px;
  text-align: center;
}

.chapter-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.chapter-item {
  padding: 20px;
  border: 1px solid rgba(135, 206, 235, 0.1);
  text-decoration: none;
  color: #87CEEB;
}

/* =========================
   📖 内容排版（恢复你原本质感）
   ========================= */

#content {
  max-width: 800px;
  margin: 0 auto;
  padding: 100px 20px 40px;
}

#posts::before {
  content: "SIGNAL ARCHIVE";
  display: block;
  text-align: center;
  font-size: 11px;
  letter-spacing: 6px;
  opacity: 0.25;
  margin-bottom: 30px;
}

.post-item {
  padding: 22px 0;
  border-bottom: 1px solid rgba(135, 206, 235, 0.08);
}

.post-title a {
  color: #87CEEB;
  text-decoration: none;
  font-size: 18px;
  font-weight: 400;
}

.post-title a:hover {
  color: #ffffff;
}

.post-excerpt {
  margin-top: 8px;
  font-size: 13px;
  opacity: 0.55;
  line-height: 1.6;
}

/* =========================
   ❗关键修复：防 ENTER 后“空内容”
   ========================= */

body.reading #content {
  opacity: 1 !important;
  visibility: visible !important;
}

/* =========================
   返回按钮
   ========================= */

.back-top {
  position: fixed;
  right: 20px;
  bottom: 20px;
  font-size: 14px;
  opacity: 0.4;
  cursor: pointer;
}

</style>
</head>

<body class="night">

<section class="site-hero">

  <div class="moon"></div>

  <div class="hero-inner">

    <h1 onclick="backToTop()">FM214831</h1>

    <p>海边月亮 / 同人信号系统</p>

    <div onclick="enterWorld()" style="margin-top:30px; cursor:pointer;">
      ENTER
    </div>

  </div>

</section>


<section class="chapter-map">
  <div class="chapter-grid">
    <a class="chapter-item" href="/categories/短篇/">短篇</a>
    <a class="chapter-item" href="/categories/长篇/">长篇</a>
    <a class="chapter-item" href="/categories/片段/">片段</a>
    <a class="chapter-item" href="/categories/同人图/">图像</a>
  </div>
</section>


<main id="content">



<article class="post-item">

  <h2 class="post-title">
    <a href="/"></a>
  </h2>

  

</article>



</main>


<div class="back-top" onclick="backToTop()">↑</div>


<script>

let mode = "home";

/* ENTER：只锁状态，不抢 scroll */
function enterWorld() {
  mode = "reading";

  document.body.classList.remove("night", "dusk");
  document.body.classList.add("reading");

  document.querySelector(".site-hero").classList.add("hide-hero");

  setTimeout(() => {
    document.getElementById("content").scrollIntoView({
      behavior: "smooth"
    });
  }, 200);
}

/* 返回 */
function backToTop() {
  mode = "home";

  window.scrollTo({ top: 0, behavior: "smooth" });

  document.body.classList.remove("reading", "dusk");
  document.body.classList.add("night");

  document.querySelector(".site-hero").classList.remove("hide-hero");
}

/* scroll 只在 home 生效（避免覆盖 ENTER） */
window.addEventListener("scroll", () => {
  if (mode !== "home") return;

  const y = window.scrollY;

  if (y < 120) {
    document.body.classList.add("night");
    document.body.classList.remove("dusk", "reading");
  } else if (y < 500) {
    document.body.classList.add("dusk");
    document.body.classList.remove("night", "reading");
  } else {
    document.body.classList.add("reading");
    document.body.classList.remove("night", "dusk");
  }
});

</script>

</body>
</html>
