<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>FM214831</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ==================================================
       🌙 世界入口 + 滚动月亮 + 沉浸阅读
       ================================================== */

    /* ----- 全局背景（深海渐变） ----- */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(
        to bottom,
        #050d18 0%,
        #0b1a2a 50%,
        #2775b6 100%
      ) fixed !important;
      color: #9fbcd3;
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
    }

    /* ----- HERO 区 ----- */
    .site-hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* 月亮本体（独立元素，用于滚动控制） */
    .moon {
      position: absolute;
      width: 170px;
      height: 170px;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(135, 206, 235, 0.3),
        rgba(135, 206, 235, 0.1),
        transparent 70%
      );
      filter: blur(10px);
      opacity: 0.8;
      transition: all 0.6s ease;
      pointer-events: none;
    }

    /* 月亮滚动后的状态：上升 + 淡出 + 缩小 */
    .moon.move-up {
      transform: translate(-50%, -120px) scale(0.85);
      opacity: 0;
    }

    /* Hero 文字区域 */
    .hero-inner {
      max-width: 700px;
      padding: 0 20px;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .hero-title {
      font-size: 52px;
      letter-spacing: 2px;
      color: #87CEEB;
      margin-bottom: 16px;
    }

    .hero-subtitle {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 18px;
    }

    .hero-note {
      font-size: 13px;
      opacity: 0.6;
      letter-spacing: 2px;
    }

    /* ENTER 按钮 */
    .hero-enter {
      margin-top: 40px;
      font-size: 12px;
      letter-spacing: 4px;
      opacity: 0.5;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .hero-enter:hover {
      opacity: 1;
      color: #ffffff;
    }

    /* Hero 退出状态 */
    .site-hero.hide-hero .hero-inner {
      opacity: 0;
      transform: translateY(-20px);
    }

    .site-hero.hide-hero .moon {
      opacity: 0;
    }

    /* ----- 内容区 ----- */
    #content {
      max-width: 800px;
      margin: 0 auto;
      padding: 100px 20px 40px;
    }

    #posts::before {
      content: "SIGNAL ARCHIVE";
      display: block;
      text-align: center;
      font-size: 11px;
      letter-spacing: 6px;
      opacity: 0.25;
      margin-bottom: 30px;
    }

    .post-item {
      padding: 22px 0;
      border-bottom: 1px solid rgba(135, 206, 235, 0.08);
    }

    .post-title a {
      color: #87CEEB;
      text-decoration: none;
      font-size: 18px;
      font-weight: 400;
    }

    .post-title a:hover {
      color: #ffffff;
    }

    .post-excerpt {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.55;
      line-height: 1.6;
    }

    /* ----- 沉浸阅读模式（文章页用） ----- */
    .post-focus {
      background: #050d18 !important;
      color: #dbe9f5 !important;
    }

    .post-focus .sidebar,
    .post-focus .header,
    .post-focus .footer {
      opacity: 0.2;
      transition: opacity 0.4s ease;
    }

    .post-focus .post {
      max-width: 720px;
      margin: 0 auto;
      font-size: 16px;
      line-height: 1.9;
    }

    /* ----- 页脚 ----- */
    .footer {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.4;
    }
  </style>
</head>

<body class="home">

<!-- =========================
     HERO（世界入口）
     ========================= -->
<section class="site-hero">

  <!-- 月亮元素 -->
  <div class="moon"></div>

  <div class="hero-inner">

    <h1 class="hero-title">FM214831</h1>

    <p class="hero-subtitle">
      海边月亮、全糖可乐、以及一些真挚的关系。
    </p>

    <p class="hero-note">
      微弱信号，不定期广播。
    </p>

    <div class="hero-enter" onclick="enterWorld()">
      ENTER
    </div>

  </div>

</section>


<!-- =========================
     内容区（记录流）
     ========================= -->
<main id="content">

  <section id="posts">

    

      <article class="post-item">

        <h2 class="post-title">
          <a href="/">
            
          </a>
        </h2>

        

      </article>

    

  </section>

</main>


<!-- =========================
     footer
     ========================= -->
<footer class="footer">
  <p>信号持续发送中。</p>
</footer>


<!-- =========================
     JS：入口动作 + 月亮滚动
     ========================= -->
<script>
const moon = document.querySelector(".moon");
const hero = document.querySelector(".site-hero");

function enterWorld() {
  hero.classList.add("hide-hero");

  setTimeout(() => {
    document.getElementById("content").scrollIntoView({
      behavior: "smooth"
    });
  }, 300);
}

/* 滚动控制月亮：页面滚动超过 50px 时，月亮上升并淡出 */
window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;

  if (scrollY > 50) {
    moon.classList.add("move-up");
  } else {
    moon.classList.remove("move-up");
  }
});
</script>

</body>
</html>
