<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FM214831</title>
<link rel="stylesheet" href="/css/main.css">

<style>

/* =========================
   基础稳定层
   ========================= */

html {
  scroll-behavior: auto;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "PingFang SC", "Noto Sans SC", sans-serif;
  transition: background 0.6s ease, color 0.6s ease;
}

/* =========================
   三状态（唯一控制源）
   ========================= */

body.night {
  background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6);
  color: #9fbcd3;
}

body.dusk {
  background: linear-gradient(to bottom, #0b1220, #1b2a3a, #3a5f7a);
}

body.reading {
  background: #050d18;
}

/* =========================
   HERO
   ========================= */

.site-hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.site-hero.hide {
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
}

.moon {
  position: absolute;
  width: 160px;
  height: 160px;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(135,206,235,0.3), transparent);
  filter: blur(10px);
  opacity: 0.8;
}

/* =========================
   内容区
   ========================= */

#content {
  max-width: 800px;
  margin: 0 auto;
  padding: 100px 20px;
}

.post-item {
  padding: 22px 0;
  border-bottom: 1px solid rgba(135,206,235,0.08);
}

/* =========================
   章节地图
   ========================= */

.chapter-map {
  padding: 80px 20px;
  text-align: center;
}

/* =========================
   bug修复关键：避免“消失”
   ========================= */

body.reading #content,
body.reading .chapter-map {
  opacity: 1 !important;
  visibility: visible !important;
}

</style>
</head>

<body class="night">

<!-- HERO -->
<section class="site-hero">
  <div class="moon"></div>

  <div>
    <h1 onclick="backToTop()">FM214831</h1>

    <p>海边月亮 / 同人信号</p>

    <div onclick="enterWorld()" style="cursor:pointer; margin-top:30px;">
      ENTER
    </div>
  </div>
</section>

<!-- CHAPTER -->
<section class="chapter-map">
  <a href="/categories/短篇/">短篇</a>
  <a href="/categories/长篇/">长篇</a>
  <a href="/categories/片段/">片段</a>
  <a href="/categories/同人图/">图像</a>
</section>

<!-- CONTENT -->
<main id="content">


  <article class="post-item">
    <h2><a href="/"></a></h2>
  </article>


</main>

<!-- JS -->
<script>

let mode = "home";

function enterWorld() {
  mode = "reading";

  document.body.className = "reading";

  document.querySelector(".site-hero").classList.add("hide");

  // ❗关键：避免scrollIntoView触发闪
  setTimeout(() => {
    document.getElementById("content").scrollIntoView();
  }, 200);
}

function backToTop() {
  mode = "home";

  window.scrollTo({ top: 0 });

  document.body.className = "night";

  document.querySelector(".site-hero").classList.remove("hide");
}

/* scroll只在home生效 */
window.addEventListener("scroll", () => {
  if (mode !== "home") return;

  const y = window.scrollY;

  if (y < 120) {
    document.body.className = "night";
  } else if (y < 500) {
    document.body.className = "dusk";
  } else {
    document.body.className = "reading";
  }
});

</script>

</body>
</html>
