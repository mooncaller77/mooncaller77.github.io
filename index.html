<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>FM214831</title>
  <link rel="stylesheet" href="/css/main.css">

  <style>
    /* =========================
       🌙 三状态世界（稳定版）
       ========================= */

    html {
      scroll-behavior: auto; /* 防闪关键 */
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      transition: background 0.8s ease, color 0.8s ease;
    }

    body.night {
      background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6);
      color: #9fbcd3;
    }

    body.dusk {
      background: linear-gradient(to bottom, #0b1220, #1b2a3a, #3a5f7a);
      color: #b8c9d8;
    }

    body.reading {
      background: #050d18;
      color: #dbe9f5;
    }

    /* =========================
       🌙 HERO
       ========================= */

    .site-hero {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .moon {
      position: absolute;
      width: 160px;
      height: 160px;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135,206,235,0.3), transparent);
      filter: blur(10px);
      opacity: 0.8;
      transition: all 0.8s ease;
    }

    body.dusk .moon {
      opacity: 0.4;
      transform: translate(-50%, -40px) scale(0.9);
    }

    body.reading .moon {
      opacity: 0;
      transform: translate(-50%, -80px) scale(0.7);
    }

    .hero-inner {
      max-width: 700px;
      padding: 0 20px;
    }

    .hero-title {
      font-size: 52px;
      color: #87CEEB;
      cursor: pointer;
    }

    .hero-enter {
      margin-top: 40px;
      font-size: 12px;
      letter-spacing: 4px;
      opacity: 0.5;
      cursor: pointer;
    }

    .hero-enter:hover {
      opacity: 1;
    }

    .site-hero.hide-hero {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
    }

    /* =========================
       📚 章节地图
       ========================= */

    .chapter-map {
      padding: 80px 20px;
      text-align: center;
    }

    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .chapter-item {
      padding: 20px;
      border: 1px solid rgba(135,206,235,0.15);
      text-decoration: none;
      color: #87CEEB;
    }

    /* =========================
       📡 内容区
       ========================= */

    #content {
      max-width: 800px;
      margin: 0 auto;
      padding: 100px 20px;
    }

    .post-item {
      padding: 22px 0;
      border-bottom: 1px solid rgba(135,206,235,0.08);
    }

    .post-title a {
      color: #87CEEB;
      text-decoration: none;
    }

    /* =========================
       🔘 返回按钮
       ========================= */

    .back-top {
      position: fixed;
      right: 20px;
      bottom: 20px;
      cursor: pointer;
      opacity: 0.4;
      z-index: 999;
    }

    .back-top:hover {
      opacity: 1;
    }

  </style>
</head>

<body class="night">

<!-- =========================
     HERO
     ========================= -->
<section class="site-hero">

  <div class="moon"></div>

  <div class="hero-inner">

    <h1 class="hero-title" onclick="backToTop()">
      FM214831
    </h1>

    <p class="hero-subtitle">
      全糖可乐、海边月亮、以及一些真挚的关系。
    </p>

    <p class="hero-note">
      年年康乐，岁岁满全。
    </p>

    <div class="hero-enter" onclick="enterWorld()">
      ENTER
    </div>

  </div>

</section>


<!-- =========================
     章节地图
     ========================= -->
<section class="chapter-map">

  <div class="chapter-grid">

    <a class="chapter-item" href="/categories/短篇/">短篇</a>
    <a class="chapter-item" href="/categories/长篇/">长篇</a>
    <a class="chapter-item" href="/categories/片段/">片段</a>
    <a class="chapter-item" href="/categories/同人图/">图像</a>

  </div>

</section>


<!-- =========================
     内容区
     ========================= -->
<main id="content">

  

  <article class="post-item">

    <h2 class="post-title">
      <a href="/"></a>
    </h2>

    

  </article>

  

</main>


<footer class="footer">
  <p>信号持续发送中。</p>
</footer>


<div class="back-top" onclick="backToTop()">↑</div>


<!-- =========================
     JS（稳定状态机版）
     ========================= -->
<script>
const body = document.body;
const hero = document.querySelector(".site-hero");
const moon = document.querySelector(".moon");

let mode = "home";

/* ENTER进入 */
function enterWorld() {
  mode = "reading";

  body.classList.remove("night", "dusk");
  body.classList.add("reading");

  hero.classList.add("hide-hero");

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById("content").scrollIntoView({
        behavior: "smooth"
      });
    }, 200);
  });
}

/* 返回顶部 */
function backToTop() {
  mode = "home";

  window.scrollTo({ top: 0, behavior: "smooth" });

  body.classList.remove("reading", "dusk");
  body.classList.add("night");

  hero.classList.remove("hide-hero");
}

/* scroll系统（只在home状态生效） */
window.addEventListener("scroll", () => {
  if (mode !== "home") return;

  const y = window.scrollY;

  if (y < 120) {
    body.classList.add("night");
    body.classList.remove("dusk", "reading");
  } else if (y < 500) {
    body.classList.add("dusk");
    body.classList.remove("night", "reading");
  } else {
    body.classList.add("reading");
    body.classList.remove("night", "dusk");
  }

  if (moon) {
    if (y > 120) moon.style.transform = "translate(-50%, -40px) scale(0.9)";
    else moon.style.transform = "";
  }
});
</script>

</body>
</html>
