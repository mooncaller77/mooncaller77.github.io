<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FM214831</title>
<link rel="stylesheet" href="/css/main.css">

<style>

/* =========================
   🌌 基础（保留你的风格）
   ========================= */

html {
  scroll-behavior: auto;
  background: #050d18; /* 防白闪 */
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "PingFang SC", "Noto Sans SC", sans-serif;

  /* ✔ 保留你的蓝色体系 */
  color: #9fbcd3;
}

/* =========================
   🌈 背景层（防闪核心）
   ========================= */

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: -1;
  transition: background 0.8s ease;
}

/* 夜晚（恢复你的原始配色） */
body.night + .bg-layer {
  background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6);
}

/* 黄昏 */
body.dusk + .bg-layer {
  background: linear-gradient(to bottom, #0b1220, #1b2a3a, #3a5f7a);
}

/* 阅读（只是压暗，不改变体系） */
body.reading + .bg-layer {
  background: linear-gradient(to bottom, #050d18, #081521, #0b1a2a);
}

/* =========================
   🌙 HERO
   ========================= */

.site-hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.site-hero.hide {
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
}

.moon {
  position: absolute;
  width: 160px;
  height: 160px;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;

  /* ✔ 保留你的原月亮色 */
  background: radial-gradient(circle, rgba(135,206,235,0.3), transparent);

  filter: blur(10px);
  opacity: 0.85;
}

/* =========================
   📚 章节地图（不动）
   ========================= */

.chapter-map {
  padding: 80px 20px;
  text-align: center;
}

.chapter-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
  max-width: 760px;
  margin: 0 auto;
}

.chapter-item {
  padding: 18px;
  border: 1px solid rgba(135,206,235,0.12);
  text-decoration: none;
  color: #87CEEB;
}

/* =========================
   📖 内容排版（恢复质感）
   ========================= */

#content {
  max-width: 820px;
  margin: 0 auto;
  padding: 90px 22px;
}

.post-item {
  padding: 26px 0;
  border-bottom: 1px solid rgba(135,206,235,0.08);
}

.post-title {
  margin: 0 0 8px;
  font-size: 20px;
  font-weight: 500;
  line-height: 1.4;
}

.post-title a {
  color: #87CEEB;
  text-decoration: none;
}

.post-title a:hover {
  color: #ffffff;
}

.post-excerpt {
  font-size: 13px;
  line-height: 1.75;
  opacity: 0.6;
}

/* =========================
   ❗关键修复：防“阅读模式内容消失”
   ========================= */

body.reading #content,
body.reading .chapter-map,
body.reading .post-item {
  opacity: 1 !important;
  visibility: visible !important;
  transform: none !important;
}

/* =========================
   返回按钮
   ========================= */

.back-top {
  position: fixed;
  right: 18px;
  bottom: 18px;
  opacity: 0.45;
  cursor: pointer;
}

</style>
</head>

<body class="night">

<!-- 背景层 -->
<div class="bg-layer"></div>

<!-- HERO -->
<section class="site-hero">

  <div class="moon"></div>

  <div>
    <h1 onclick="backToTop()">FM214831</h1>

    <p>海边月亮 / 同人信号系统</p>

    <div onclick="enterWorld()" style="margin-top:30px; cursor:pointer;">
      ENTER
    </div>
  </div>

</section>


<!-- chapter -->
<section class="chapter-map">
  <div class="chapter-grid">
    <a class="chapter-item" href="/categories/短篇/">短篇</a>
    <a class="chapter-item" href="/categories/长篇/">长篇</a>
    <a class="chapter-item" href="/categories/片段/">片段</a>
    <a class="chapter-item" href="/categories/同人图/">图像</a>
  </div>
</section>


<!-- content -->
<main id="content">



<article class="post-item">
  <h2 class="post-title">
    <a href="/"></a>
  </h2>

  
</article>



</main>


<div class="back-top" onclick="backToTop()">↑</div>


<!-- =========================
   JS（稳定无闪版本）
   ========================= -->
<script>

let mode = "home";

function enterWorld() {
  mode = "reading";

  document.body.classList.remove("night", "dusk");
  document.body.classList.add("reading");

  document.querySelector(".site-hero").classList.add("hide");

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById("content").scrollIntoView({
        behavior: "smooth"
      });
    }, 120);
  });
}

function backToTop() {
  mode = "home";

  window.scrollTo({ top: 0, behavior: "smooth" });

  document.body.classList.remove("reading", "dusk");
  document.body.classList.add("night");

  document.querySelector(".site-hero").classList.remove("hide");
}

window.addEventListener("scroll", () => {
  if (mode !== "home") return;

  const y = window.scrollY;

  if (y < 120) {
    document.body.classList.add("night");
  } else if (y < 500) {
    document.body.classList.add("dusk");
  } else {
    document.body.classList.add("reading");
  }
});

</script>

</body>
</html>
