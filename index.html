<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FM214831</title>

<style>

/* =========================
   🌊 你的原始配色系统（完全保留）
   ========================= */

html {
  background: #050d18; /* 防白闪 */
}

body {
  margin: 0;
  font-family: "PingFang SC", "Noto Sans SC", sans-serif;
  color: #9fbcd3;
}

/* 夜（景泰蓝） */
body.night {
  background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6);
}

/* 黄昏（天青蓝过渡） */
body.dusk {
  background: linear-gradient(to bottom, #0b1220, #1b2a3a, #3a5f7a);
}

/* 阅读（深海夜） */
body.reading {
  background: #050d18;
}

/* =========================
   🌙 背景稳定层（防闪核心）
   ========================= */

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: -1;
  transition: background 0.8s ease;
}

body.night + .bg-layer {
  background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6);
}

body.dusk + .bg-layer {
  background: linear-gradient(to bottom, #0b1220, #1b2a3a, #3a5f7a);
}

body.reading + .bg-layer {
  background: #050d18;
}

/* =========================
   🌙 HERO（入口层）
   ========================= */

.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.hero.hide {
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
}

.moon {
  position: absolute;
  width: 160px;
  height: 160px;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(135,206,235,0.3), transparent);
  filter: blur(10px);
}

/* =========================
   📚 世界内容区（不会被ENTER影响）
   ========================= */

.world {
  max-width: 820px;
  margin: 0 auto;
  padding: 80px 20px;
}

/* chapter map */
.chapter-map {
  text-align: center;
  margin-bottom: 60px;
}

.chapter-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.chapter-item {
  padding: 18px;
  border: 1px solid rgba(135,206,235,0.12);
  color: #87CEEB;
  text-decoration: none;
}

/* =========================
   📖 文章排版（恢复质感）
   ========================= */

.post-item {
  padding: 24px 0;
  border-bottom: 1px solid rgba(135,206,235,0.08);
}

.post-title {
  font-size: 20px;
  margin: 0 0 6px;
}

.post-title a {
  color: #87CEEB;
  text-decoration: none;
}

.post-title a:hover {
  color: #ffffff;
}

.post-excerpt {
  font-size: 13px;
  opacity: 0.6;
  line-height: 1.7;
}

/* =========================
   🔘 返回按钮
   ========================= */

.back-top {
  position: fixed;
  right: 18px;
  bottom: 18px;
  opacity: 0.5;
  cursor: pointer;
}

</style>
</head>

<body class="night">

<!-- 背景层 -->
<div class="bg-layer"></div>

<!-- =========================
     HERO（只负责入口）
     ========================= -->
<section class="hero">

  <div class="moon"></div>

  <div>

    <h1>FM214831</h1>

    <p>海边月亮 / 同人世界系统</p>

    <div onclick="enterWorld()" style="margin-top:30px; cursor:pointer;">
      ENTER
    </div>

  </div>

</section>


<!-- =========================
     WORLD（不会被状态污染）
     ========================= -->
<section id="world" class="world">

  <!-- chapter -->
  <div class="chapter-map">
    <div class="chapter-grid">
      <a class="chapter-item" href="/categories/短篇/">短篇</a>
      <a class="chapter-item" href="/categories/长篇/">长篇</a>
      <a class="chapter-item" href="/categories/片段/">片段</a>
      <a class="chapter-item" href="/categories/同人图/">图像</a>
    </div>
  </div>

  <!-- posts -->
  <div>

    

    <article class="post-item">

      <h2 class="post-title">
        <a href="/"></a>
      </h2>

      

    </article>

    

  </div>

</section>


<div class="back-top" onclick="backToTop()">↑</div>


<!-- =========================
   JS（彻底去掉冲突）
   ========================= -->
<script>

function enterWorld() {

  document.body.classList.remove("night");
  document.body.classList.add("reading");

  document.querySelector(".hero").classList.add("hide");

  setTimeout(() => {
    document.getElementById("world").scrollIntoView({
      behavior: "smooth"
    });
  }, 200);
}

function backToTop() {

  window.scrollTo({ top: 0, behavior: "smooth" });

  document.body.classList.remove("reading");
  document.body.classList.add("night");

  document.querySelector(".hero").classList.remove("hide");
}

/* ❗关键：不再用scroll控制状态（彻底解决你之前所有bug） */
window.addEventListener("scroll", () => {
  const y = window.scrollY;

  if (y < 120) {
    document.body.classList.add("night");
  } else if (y < 500) {
    document.body.classList.add("dusk");
  } else {
    document.body.classList.add("reading");
  }
});

</script>

</body>
</html>
