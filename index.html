<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>FM214831</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ==================================================
       🌙 三状态世界系统 + 章节地图
       ================================================== */

    /* ----- 全局背景过渡 ----- */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      transition: background 1s ease;
    }

    /* 夜晚（默认） */
    body.night {
      background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6);
      color: #9fbcd3;
    }

    /* 黄昏 */
    body.dusk {
      background: linear-gradient(to bottom, #0b1220, #1b2a3a, #3a5f7a);
      color: #b8c9d8;
    }

    /* 阅读 */
    body.reading {
      background: #050d18;
      color: #dbe9f5;
    }

    /* ----- HERO 区域 ----- */
    .site-hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .moon {
      position: absolute;
      width: 160px;
      height: 160px;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135,206,235,0.3), transparent);
      filter: blur(10px);
      opacity: 0.8;
      transition: all 0.8s ease;
    }

    /* 时间系统：月亮联调 */
    body.dusk .moon {
      opacity: 0.4;
      transform: translate(-50%, -40px) scale(0.9);
    }

    body.reading .moon {
      opacity: 0;
      transform: translate(-50%, -80px) scale(0.7);
    }

    /* Hero 文字区域 */
    .hero-inner {
      max-width: 700px;
      padding: 0 20px;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .hero-title {
      font-size: 52px;
      letter-spacing: 2px;
      color: #87CEEB;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .hero-subtitle {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 18px;
    }

    .hero-note {
      font-size: 13px;
      opacity: 0.6;
      letter-spacing: 2px;
    }

    .hero-enter {
      margin-top: 40px;
      font-size: 12px;
      letter-spacing: 4px;
      opacity: 0.5;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .hero-enter:hover {
      opacity: 1;
      color: #ffffff;
    }

    /* Hero 退出状态 */
    .site-hero.hide-hero {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
    }

    .site-hero.hide-hero .moon {
      opacity: 0;
    }

    /* ----- 章节地图（分类入口） ----- */
    .chapter-map {
      padding: 80px 20px;
      text-align: center;
    }

    .chapter-title {
      font-size: 11px;
      letter-spacing: 6px;
      opacity: 0.3;
      margin-bottom: 40px;
    }

    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .chapter-item {
      padding: 20px;
      border: 1px solid rgba(135, 206, 235, 0.1);
      text-decoration: none;
      color: #87CEEB;
      transition: 0.3s;
    }

    .chapter-item:hover {
      border-color: #87CEEB;
      transform: translateY(-3px);
    }

    .chapter-item h3 {
      margin: 0 0 6px 0;
      font-size: 18px;
    }

    .chapter-item p {
      margin: 0;
      font-size: 12px;
      opacity: 0.6;
    }

    /* ----- 内容区（文章列表） ----- */
    #content {
      max-width: 800px;
      margin: 0 auto;
      padding: 100px 20px 40px;
    }

    #posts::before {
      content: "SIGNAL ARCHIVE";
      display: block;
      text-align: center;
      font-size: 11px;
      letter-spacing: 6px;
      opacity: 0.25;
      margin-bottom: 30px;
    }

    .post-item {
      padding: 22px 0;
      border-bottom: 1px solid rgba(135, 206, 235, 0.08);
    }

    .post-title a {
      color: #87CEEB;
      text-decoration: none;
      font-size: 18px;
      font-weight: 400;
    }

    .post-title a:hover {
      color: #ffffff;
    }

    .post-excerpt {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.55;
      line-height: 1.6;
    }

    /* ----- 返回顶部按钮 ----- */
    .back-top {
      position: fixed;
      right: 20px;
      bottom: 20px;
      font-size: 14px;
      opacity: 0.4;
      cursor: pointer;
      transition: 0.3s;
      z-index: 999;
    }

    .back-top:hover {
      opacity: 1;
      color: #87CEEB;
    }

    /* ----- 沉浸阅读模式（文章详情页用） ----- */
    .post-focus {
      background: #050d18 !important;
      color: #dbe9f5 !important;
    }

    .post-focus .sidebar,
    .post-focus .header,
    .post-focus .footer {
      opacity: 0.2;
      transition: opacity 0.4s ease;
    }

    .post-focus .post {
      max-width: 720px;
      margin: 0 auto;
      font-size: 16px;
      line-height: 1.9;
    }

    /* ----- 页脚 ----- */
    .footer {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.4;
    }
  </style>
</head>

<body class="night">

<!-- =========================
     HERO（世界入口）
     ========================= -->
<section class="site-hero">

  <div class="moon"></div>

  <div class="hero-inner">

    <h1 class="hero-title" onclick="backToTop()">FM214831</h1>

    <p class="hero-subtitle">
      全糖可乐、海边月亮、以及一些真挚的关系。
    </p>

    <p class="hero-note">
      年年康乐，岁岁满全。
    </p>

    <div class="hero-enter" onclick="enterWorld()">
      ENTER
    </div>

  </div>

</section>


<!-- =========================
     章节地图（分类入口）
     ========================= -->
<section class="chapter-map">

  <div class="chapter-title">CHAPTER MAP</div>

  <div class="chapter-grid">

    <a href="/categories/短篇/" class="chapter-item">
      <h3>短篇</h3>
      <p>偶发事件与夜晚记录</p>
    </a>

    <a href="/categories/长篇/" class="chapter-item">
      <h3>长篇</h3>
      <p>持续发生的关系线</p>
    </a>

    <a href="/categories/片段/" class="chapter-item">
      <h3>片段</h3>
      <p>未完成的信号</p>
    </a>

    <a href="/categories/同人图/" class="chapter-item">
      <h3>图像</h3>
      <p>视觉记忆碎片</p>
    </a>

  </div>

</section>


<!-- =========================
     内容区（文章列表）
     ========================= -->
<main id="content">

  <section id="posts">

    

      <article class="post-item">

        <h2 class="post-title">
          <a href="/">
            
          </a>
        </h2>

        

      </article>

    

  </section>

</main>


<!-- =========================
     footer
     ========================= -->
<footer class="footer">
  <p>信号持续发送中。</p>
</footer>


<!-- 返回顶部按钮 -->
<div class="back-top" onclick="backToTop()">↑</div>


<!-- =========================
     JS：时间系统 + 入口动作 + 状态复位
     ========================= -->
<script>
const body = document.body;
const hero = document.querySelector(".site-hero");
const moon = document.querySelector(".moon");

// 模式锁：normal | reading
// 只有 normal 模式下，滚动才能改变背景状态
let mode = "normal";

/* ENTER：手动进入阅读状态 */
function enterWorld() {
  // 锁定模式，禁止滚动再改变背景
  mode = "reading";

  // 安全地切换类名，不覆盖其他可能存在的类
  body.classList.add("reading");
  body.classList.remove("night", "dusk");

  // 隐藏 Hero 区域
  hero.classList.add("hide-hero");

  // 延迟滚动，让 CSS 过渡先开始
  setTimeout(() => {
    document.getElementById("content").scrollIntoView({
      behavior: "smooth"
    });
  }, 300);
}

/* 返回顶部：恢复到夜晚状态 */
function backToTop() {
  // 解锁模式，允许滚动重新控制背景
  mode = "normal";

  window.scrollTo({ top: 0, behavior: "smooth" });

  // 恢复到夜晚状态
  body.classList.add("night");
  body.classList.remove("dusk", "reading");

  // 恢复 Hero 区域
  hero.classList.remove("hide-hero");
}

/* 滚动驱动的时间系统（只在 normal 模式下生效） */
window.addEventListener("scroll", () => {
  // 如果已进入阅读模式，则不再根据滚动改变状态
  if (mode === "reading") {
    return;
  }

  const y = window.scrollY;

  if (y < 100) {
    body.classList.add("night");
    body.classList.remove("dusk", "reading");
  } else if (y < 500) {
    body.classList.add("dusk");
    body.classList.remove("night", "reading");
  } else {
    body.classList.add("reading");
    body.classList.remove("night", "dusk");
  }

  /* 月亮上升联动 */
  if (moon) {
    if (y > 120) {
      moon.classList.add("move-up");
    } else {
      moon.classList.remove("move-up");
    }
  }
});
</script>

</body>
</html>
