<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>FM214831</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ==================================================
       🌙 世界入口系统（独立 Hero）
       ================================================== */

    .site-hero {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .hero-inner {
      max-width: 700px;
      padding: 0 20px;
    }

    .hero-title {
      font-size: 52px;
      letter-spacing: 2px;
      color: #87CEEB;
      margin-bottom: 16px;
    }

    .hero-subtitle {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 18px;
    }

    .hero-note {
      font-size: 13px;
      opacity: 0.6;
      letter-spacing: 2px;
    }

    .hero-scroll {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.4;
      letter-spacing: 3px;
    }

    /* 月亮光晕（稳定版） */
    .site-hero::before {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(
        circle,
        rgba(135, 206, 235, 0.25),
        rgba(135, 206, 235, 0.08),
        transparent 70%
      );
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.75;
      pointer-events: none;
    }


    /* ==================================================
       🌫 空间断层（关键：把世界和记录分开）
       ================================================== */

    .scene-divider {
      height: 120px;
      background: linear-gradient(
        to bottom,
        rgba(5, 13, 24, 0) 0%,
        rgba(5, 13, 24, 0.6) 40%,
        rgba(5, 13, 24, 1) 100%
      );
    }


    /* ==================================================
       📓 记录区（从博客 → 信号档案）
       ================================================== */

    #content {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    #posts::before {
      content: "SIGNAL ARCHIVE";
      display: block;
      text-align: center;
      font-size: 11px;
      letter-spacing: 6px;
      opacity: 0.25;
      margin-bottom: 30px;
    }

    .post-item {
      padding: 22px 0;
      border-bottom: 1px solid rgba(135, 206, 235, 0.08);
    }

    .post-title a {
      color: #87CEEB;
      text-decoration: none;
      font-size: 18px;
      font-weight: 400;
    }

    .post-title a:hover {
      color: #ffffff;
    }

    .post-excerpt {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.55;
      line-height: 1.6;
    }


    /* ==================================================
       📡 footer
       ================================================== */

    .footer {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.4;
    }

    .footer-inner::after {
      content: "信号持续发送中";
      display: block;
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body class="home">

<!-- =========================
     1. 世界入口（独立 HERO）
     ========================= -->
<section class="site-hero">

  <div class="hero-inner">

    <h1 class="hero-title">FM214831</h1>

    <p class="hero-subtitle">
      海边月亮、全糖可乐、以及一些真挚的关系。
    </p>

    <p class="hero-note">
      微弱信号，不定期广播。
    </p>

    <div class="hero-scroll">
      ↓ Enter
    </div>

  </div>

</section>


<!-- =========================
     2. 空间断层（视觉分隔）
     ========================= -->
<div class="scene-divider"></div>


<!-- =========================
     3. 记录区（文章）
     ========================= -->
<main id="content">

  <section id="posts">

    

      <article class="post-item">

        <h2 class="post-title">
          <a href="/">
            
          </a>
        </h2>

        

      </article>

    

  </section>

</main>


<!-- =========================
     4. footer
     ========================= -->
<footer class="footer">
  <div class="footer-inner">
    <p>信号持续发送中。</p>
  </div>
</footer>

</body>
</html>
