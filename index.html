<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FM214831</title>
<link rel="stylesheet" href="/css/main.css">

<style>

/* =========================
   🌌 基础
   ========================= */

html {
  background: #050d18; /* 防白闪兜底 */
  scroll-behavior: auto;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "PingFang SC", "Noto Sans SC", sans-serif;
  color: #9fbcd3;
  background: transparent !important;
}

/* =========================
   🌈 背景层（核心修复）
   ========================= */

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: -1;
  transition: background 0.8s ease;
}

/* 夜晚 */
body.night + .bg-layer {
  background: linear-gradient(to bottom, #050d18, #0b1a2a, #2775b6);
}

/* 黄昏 */
body.dusk + .bg-layer {
  background: linear-gradient(to bottom, #0b1220, #1b2a3a, #3a5f7a);
}

/* 阅读 */
body.reading + .bg-layer {
  background: #050d18;
}

/* =========================
   🌙 HERO
   ========================= */

.site-hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.site-hero.hide {
  opacity: 0;
  transform: translateY(-20px);
  pointer-events: none;
}

.moon {
  position: absolute;
  width: 160px;
  height: 160px;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(135,206,235,0.3), transparent);
  filter: blur(10px);
  opacity: 0.85;
}

/* =========================
   📚 章节地图
   ========================= */

.chapter-map {
  padding: 80px 20px;
  text-align: center;
}

.chapter-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
  max-width: 760px;
  margin: 0 auto;
}

.chapter-item {
  padding: 18px;
  border: 1px solid rgba(135,206,235,0.12);
  text-decoration: none;
  color: #87CEEB;
}

/* =========================
   📖 内容区（排版恢复）
   ========================= */

#content {
  max-width: 820px;
  margin: 0 auto;
  padding: 90px 22px;
}

.post-item {
  padding: 26px 0;
  border-bottom: 1px solid rgba(135,206,235,0.08);
}

.post-title {
  margin: 0 0 8px;
  font-size: 20px;
  font-weight: 500;
  line-height: 1.4;
}

.post-title a {
  color: #87CEEB;
  text-decoration: none;
}

.post-title a:hover {
  color: #ffffff;
}

.post-excerpt {
  font-size: 13px;
  line-height: 1.75;
  opacity: 0.6;
}

/* =========================
   🔘 返回按钮
   ========================= */

.back-top {
  position: fixed;
  right: 18px;
  bottom: 18px;
  opacity: 0.45;
  cursor: pointer;
}

/* =========================
   🌌 状态（只影响文字，不动背景）
   ========================= */

body.reading #content {
  opacity: 1;
}

</style>
</head>

<body class="night">

<!-- 背景层（关键） -->
<div class="bg-layer"></div>

<!-- HERO -->
<section class="site-hero">

  <div class="moon"></div>

  <div>
    <h1 onclick="backToTop()">FM214831</h1>

    <p>海边月亮 / 同人信号系统</p>
